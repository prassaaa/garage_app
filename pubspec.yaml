name: garage_app
description: "S758 Garage - 16-channel relay controller via Bluetooth"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  # Firebase
  firebase_core: ^3.8.1
  firebase_auth: ^5.3.4
  # Bluetooth (BLE)
  flutter_blue_plus: ^1.35.2
  # State Management
  provider: ^6.1.2
  # UI
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1
  permission_handler: ^12.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/images/logo.png"
  adaptive_icon_background: "#2D3A5C"
  adaptive_icon_foreground: "assets/images/logo.png"

flutter:
  uses-material-design: true
  assets:
    - assets/images/
